<div style="background-color:#FBEDDC; border-left:4px solid #CC3323; padding:20px; margin-bottom:25px; border-radius:4px;">
    <p style="margin:0; color:#2B1B13; font-weight:bold;">&#128202; New Newsletter Subscriber</p>
</div>

<table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px; border-collapse:collapse;">
    <tr>
        <td style="padding:12px 0; border-bottom:1px solid #FBEDDC;">
            <strong style="color:#2B1B13;">Email Address:</strong><br/>
            <a href="mailto:{{SubscriberEmail}}" style="color:#CC3323; text-decoration:none;">{{SubscriberEmail}}</a>
        </td>
    </tr>
    <tr>
        <td style="padding:12px 0; border-bottom:1px solid #FBEDDC;">
            <strong style="color:#2B1B13;">Total Subscribers:</strong><br/>
            <span style="color:#2B1B13; font-size:18px; font-weight:bold;">{{TotalSubscribers}}</span>
        </td>
    </tr>
    <tr>
        <td style="padding:12px 0;">
            <strong style="color:#2B1B13;">Subscribed At:</strong><br/>
            <span style="color:#2B1B13;">{{SubscribedAt}} UTC</span>
        </td>
    </tr>
</table>

<p style="margin:0; text-align:center; color:#666666; font-size:13px;">
    Manage subscribers in your admin dashboard.
</p>
